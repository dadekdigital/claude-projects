<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #7c6ff7, #f76fc1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 1.1rem;
      height: 1.6rem;
      margin-bottom: 1.2rem;
      color: #b0aad8;
      transition: color 0.3s;
    }

    #status.winner { color: #7cefb0; font-weight: 600; }
    #status.draw   { color: #f7c46f; font-weight: 600; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: #1e1b3a;
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 8px 40px #0006;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #13112a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #1f1b40; transform: scale(1.04); }
    .cell.taken { cursor: default; }

    .cell.x { color: #7c6ff7; }
    .cell.o { color: #f76fc1; }

    .cell.win { background: #1a2a1a; animation: pulse 0.6s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.4rem;
      font-size: 0.95rem;
      color: #8883a8;
    }

    #scoreboard span { font-weight: 700; font-size: 1.1rem; }
    .score-x span { color: #7c6ff7; }
    .score-o span { color: #f76fc1; }
    .score-d span { color: #f7c46f; }

    #restart {
      margin-top: 1.6rem;
      padding: 0.55rem 1.8rem;
      border: 2px solid #7c6ff7;
      background: transparent;
      color: #7c6ff7;
      border-radius: 999px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #restart:hover { background: #7c6ff7; color: #fff; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="scoreboard">
  <div class="score-x">X wins: <span id="sx">0</span></div>
  <div class="score-d">Draws: <span id="sd">0</span></div>
  <div class="score-o">O wins: <span id="so">0</span></div>
</div>

<button id="restart">New Game</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, score = {X:0, O:0, D:0};

  const cells   = document.querySelectorAll('.cell');
  const status  = document.getElementById('status');
  const sx      = document.getElementById('sx');
  const so      = document.getElementById('so');
  const sd      = document.getElementById('sd');

  function init() {
    board   = Array(9).fill('');
    current = 'X';
    over    = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className   = 'cell';
    });
    status.textContent = "X's turn";
    status.className   = '';
  }

  function checkWinner() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c])
        return { winner: board[a], line: [a,b,c] };
    }
    if (board.every(Boolean)) return { winner: null };
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        over = true;
        if (result.winner) {
          result.line.forEach(j => cells[j].classList.add('win'));
          status.textContent = `${result.winner} wins! 🎉`;
          status.className   = 'winner';
          score[result.winner]++;
        } else {
          status.textContent = "It's a draw!";
          status.className   = 'draw';
          score.D++;
        }
        sx.textContent = score.X;
        so.textContent = score.O;
        sd.textContent = score.D;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    });
  });

  document.getElementById('restart').addEventListener('click', init);

  init();
</script>
</body>
</html>
